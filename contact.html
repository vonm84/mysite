<h1>Contact</h1>

<!-- Web3Forms contact form (18 Jul 2026) — messages land in Matt's inbox; the email address
     itself appears nowhere on the site. The access key below is public by design. -->
<p id="sent-note">Thank you &mdash; your message is on its way. I&rsquo;ll get back to you soon.</p>

<p>Send me a message here and it will land in my inbox:</p>

<form action="https://api.web3forms.com/submit" method="POST">
  <input type="hidden" name="access_key" value="66a5cd2d-dd9a-47b5-8657-5e258ad6e984">
  <input type="hidden" name="subject" value="New message via mysite contact form">
  <input type="hidden" name="redirect" value="https://vonm84.github.io/mysite/contact.html?sent=1">
  <input type="checkbox" name="botcheck" style="display:none" tabindex="-1" autocomplete="off">

  <label for="cf-email">Your email</label>
  <input id="cf-email" type="email" name="email" required>

  <label for="cf-message">Message</label>
  <textarea id="cf-message" name="message" required></textarea>

  <button type="submit">Send</button>
</form>
